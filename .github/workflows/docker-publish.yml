name: Docker Publish

on:
  push:
    tags:
      - 'v*'

# Release creation is owned by binary-publish.yml so both workflows attach to
# the same release without racing on its creation.
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: 3735943886/rustuya
          # `latest` / `stable` are skipped for pre-release tags (e.g. v0.3.0-rc.1)
          # so an RC build does not become the default `docker pull` target.
          # The exact semver tag (e.g. 0.3.0-rc.1) is always published.
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=stable,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
