name: Python Publish

on:
  push:
    tags:
      - 'py-v*'
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/py-v}"
          # The version is inherited from [workspace.package] in the root
          # Cargo.toml (python/Cargo.toml carries `version.workspace = true`).
          # Match `^version = ` (space-equals) to hit the quoted workspace
          # value, not the `version.workspace = true` inheritance line.
          CARGO_VER=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "tag=$TAG workspace=$CARGO_VER"
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag version ($TAG) does not match workspace version ($CARGO_VER)"
            exit 1
          fi

  linux:
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: manylinux2014
          - runner: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
          # Native aarch64 runner avoids cross-compile failures in
          # aws-lc-sys (rustls crypto backend) inside the manylinux container.
          - runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: manylinux2014
          - runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: musllinux_1_2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: python/dist

  windows:
    needs: validate
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: python/dist

  macos:
    needs: validate
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: python/dist

  publish-pypi:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/pyrustuyabridge
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyrustuyabridge
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
