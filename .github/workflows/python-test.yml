name: Python Test

on:
  push:
    branches: [master]
    paths:
      - 'python/**'
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/python-test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'python/**'
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/python-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fleet-scale:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: dtolnay/rust-toolchain@stable

      - name: Start mosquitto broker
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' | sudo tee /etc/mosquitto/conf.d/ci.conf
          sudo pkill mosquitto || true
          mosquitto -d -c /etc/mosquitto/conf.d/ci.conf
          # wait for the listener to accept connections
          for i in $(seq 1 20); do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/1883' 2>/dev/null; then
              echo "broker up"; exit 0
            fi
            sleep 0.5
          done
          echo "::error::mosquitto did not come up"; exit 1

      - name: Build binding + install test deps
        working-directory: python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin
          pip install pytest 'paho-mqtt>=2' tuyamock
          maturin develop --release

      - name: Default suite (smoke + shutdown)
        working-directory: python
        env:
          MQTT_BROKER: mqtt://localhost:1883
        run: |
          . .venv/bin/activate
          pytest -v

      - name: 1000-device fleet-scale (onboard + mass clear scavenge)
        working-directory: python
        env:
          MQTT_BROKER: mqtt://localhost:1883
          SCALE_N: '1000'
          MOCKS_PER_PROC: '100'
        run: |
          . .venv/bin/activate
          pytest -m scale -v -s
