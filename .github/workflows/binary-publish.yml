name: Binary Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Statically-linked Linux binaries — run on any glibc/musl distro
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
          # Native Windows / macOS
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and upload archive
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rustuya-bridge
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
