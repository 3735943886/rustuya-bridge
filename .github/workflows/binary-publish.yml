name: Binary Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # taiki-e/upload-rust-binary-action does not create the release itself;
  # ensure it exists (idempotently) before the matrix uploads to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      # Pre-release tags (e.g. v0.3.0-rc.1, v1.0.0-alpha.2, v1.0.0-beta) must be
      # flagged so they don't become `releases/latest` — bridgectl.sh queries that
      # endpoint to drive `install` / `upgrade`, so a mis-flagged RC would auto-ship
      # to users.
      - name: Detect pre-release from tag
        id: prerel
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ -(rc|alpha|beta)(\.|$) ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.prerel.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Statically-linked Linux binaries — run on any glibc/musl distro
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
          # Native Windows / macOS
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and upload archive
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rustuya-bridge
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
