[package]
name = "pyrustuyabridge"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "pyrustuyabridge"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
tokio = { version = "1.49", features = ["rt-multi-thread"] }
anyhow = "1.0"
pyo3-log = "0.13"
rustuyabridge = { path = "../" }
